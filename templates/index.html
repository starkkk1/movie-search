<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Máy Tìm Kiếm Phim</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 16px; }
    form { display: flex; gap: 8px; margin-bottom: 24px; }
    input[type=text] { flex: 1; padding: 10px; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    .result { display: flex; gap: 16px; padding: 16px 0; border-bottom: 1px solid #eee; }
    .result img { width: 80px; border-radius: 4px; }
    .result h3 { margin: 0 0 6px 0; }
    .result .meta { color: #666; font-size: 13px; margin-bottom: 6px; }
    .result p { margin: 0; font-size: 14px; color: #333; }
    mark { background: #ffe58a; }
  </style>
</head>
<body>
  <h1>🎬 Máy Tìm Kiếm Phim</h1>
  <form action="/" method="get">
    <input type="text" name="q" value="{{ query }}" placeholder="Nhập tên phim, diễn viên, thể loại...">
    <button type="submit">Tìm kiếm</button>
  </form>

  {% if query %}
    <p>{{ results|length }} kết quả cho "<strong>{{ query }}</strong>"</p>
  {% endif %}

  {% for r in results %}
    <div class="result">
      {% if r.poster_path %}
        <img src="https://image.tmdb.org/t/p/w92{{ r.poster_path }}" alt="{{ r.title }}">
      {% endif %}
      <div>
        <h3>{{ r.title }}</h3>
        <div class="meta">{{ r.release_date }} · {{ r.genres|join(', ') }} · điểm: {{ "%.3f"|format(r.score) }}</div>
        <p>{{ r.overview }}</p>
      </div>
    </div>
  {% endfor %}
</body>
</html>
